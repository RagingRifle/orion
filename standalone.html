<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ORION-AURORA | Dual-Model Solar Power Forecasting</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   ORION–AURORA Design System
   Dark, glassmorphism, deep-space aesthetic
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Color palette */
  --bg-deep:       hsl(224, 35%, 5%);
  --bg-surface:    hsl(224, 28%, 9%);
  --bg-card:       hsl(224, 24%, 12%);
  --bg-card-hover: hsl(224, 22%, 15%);
  --border:        hsl(224, 20%, 20%);
  --border-glow:   hsl(210, 80%, 55%);

  /* Brand accents */
  --orion:       hsl(210, 90%, 60%);
  --orion-dark:  hsl(210, 80%, 40%);
  --orion-glow:  hsl(210, 100%, 70%);
  --aurora:      hsl(270, 80%, 65%);
  --aurora-dark: hsl(270, 70%, 45%);
  --aurora-glow: hsl(270, 100%, 80%);
  --gold:        hsl(45, 95%, 60%);
  --green:       hsl(145, 70%, 52%);
  --red:         hsl(0, 75%, 60%);
  --orange:      hsl(28, 90%, 58%);

  --text-primary:   hsl(210, 30%, 96%);
  --text-secondary: hsl(210, 20%, 65%);
  --text-muted:     hsl(210, 15%, 45%);

  /* Font */
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;

  /* Spacing */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, hsl(210,70%,20%,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, hsl(270,60%,20%,0.2) 0%, transparent 50%);
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ---- Header ---- */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: hsl(224, 35%, 5%, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--orion), var(--aurora));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 20px hsl(210,80%,60%,0.3);
}

.logo-text {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo-text span.orion { color: var(--orion); }
.logo-text span.sep { color: var(--text-muted); margin: 0 3px; }
.logo-text span.aurora { color: var(--aurora); }

.header-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ---- Dataset Toggle ---- */
.dataset-toggle {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.dataset-toggle button {
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
  letter-spacing: 0.3px;
}
.dataset-toggle button.active {
  background: linear-gradient(135deg, var(--orion-dark), var(--aurora-dark));
  color: var(--text-primary);
}
.dataset-toggle button:hover:not(.active) {
  color: var(--text-secondary);
  background: hsl(224,20%,18%);
}

/* ---- Export button ---- */
.btn-export {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.btn-export:hover {
  border-color: var(--orion);
  color: var(--orion);
}

/* ---- Run button ---- */
.btn-run {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--orion), var(--aurora));
  border: none;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s;
  font-family: var(--font-body);
  box-shadow: 0 4px 15px hsl(210,80%,60%,0.25);
  letter-spacing: 0.3px;
}
.btn-run:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px hsl(210,80%,60%,0.4);
}
.btn-run:active { transform: translateY(0); }
.btn-run.running { animation: pulse-run 1.2s infinite; cursor: not-allowed; }

@keyframes pulse-run {
  0%, 100% { box-shadow: 0 4px 15px hsl(210,80%,60%,0.25); }
  50%       { box-shadow: 0 4px 25px hsl(210,80%,60%,0.55); }
}

/* ---- Main layout ---- */
.main {
  max-width: 1600px;
  margin: 0 auto;
  padding: 28px 32px 60px;
  display: grid;
  gap: 24px;
}

/* ---- Section labels ---- */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ---- Cards ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 24px;
  transition: border-color 0.3s;
}
.card:hover { border-color: hsl(224,20%,28%); }
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.dot-orion  { background: var(--orion);  box-shadow: 0 0 8px var(--orion-glow); }
.dot-aurora { background: var(--aurora); box-shadow: 0 0 8px var(--aurora-glow); }
.dot-gold   { background: var(--gold);   box-shadow: 0 0 8px var(--gold); }
.dot-green  { background: var(--green);  box-shadow: 0 0 8px var(--green); }

/* ---- Pipeline visualization ---- */
.pipeline-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 8px 0;
  flex-wrap: wrap;
  row-gap: 12px;
}
.pipeline-stage {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-width: 120px;
}
.pipeline-box {
  padding: 14px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.4s;
  width: 130px;
}
.pipeline-box::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.5s;
}
.pipeline-box.stage-input::before  { background: linear-gradient(135deg, hsl(145,70%,52%,0.15), transparent); }
.pipeline-box.stage-orion::before  { background: linear-gradient(135deg, hsl(210,90%,60%,0.15), transparent); }
.pipeline-box.stage-aurora::before { background: linear-gradient(135deg, hsl(270,80%,65%,0.15), transparent); }
.pipeline-box.stage-output::before { background: linear-gradient(135deg, hsl(45,95%,60%,0.15), transparent); }

.pipeline-box.active {
  border-color: var(--orion);
  box-shadow: 0 0 20px hsl(210,80%,60%,0.3);
}
.pipeline-box.active.aurora-active {
  border-color: var(--aurora);
  box-shadow: 0 0 20px hsl(270,70%,65%,0.3);
}
.pipeline-box.active.output-active {
  border-color: var(--gold);
  box-shadow: 0 0 20px hsl(45,90%,60%,0.3);
}
.pipeline-box.active::before { opacity: 1; }

.pipeline-box .stage-icon { font-size: 22px; line-height: 1; margin-bottom: 4px; }
.pipeline-box .stage-name { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
.pipeline-box .stage-sub  { font-size: 9px; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }

.pipeline-arrow {
  display: flex;
  align-items: center;
  color: var(--text-muted);
  font-size: 18px;
  padding: 0 4px;
  transition: color 0.4s;
  margin-top: -20px;
}
.pipeline-arrow.lit { color: var(--orion); }

.pipeline-label {
  font-size: 9px;
  color: var(--text-muted);
  text-align: center;
  max-width: 110px;
  letter-spacing: 0.3px;
}

/* ---- Progress bar ---- */
.progress-bar-wrap {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  height: 6px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--orion), var(--aurora));
  transition: width 0.4s ease;
}

/* ---- Grid layouts ---- */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

/* ---- Metric cards ---- */
.metric-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.metric-card.mc-orion::before  { background: linear-gradient(90deg, var(--orion), transparent); }
.metric-card.mc-aurora::before { background: linear-gradient(90deg, var(--aurora), transparent); }
.metric-card.mc-baseline::before { background: linear-gradient(90deg, var(--text-muted), transparent); }
.metric-card:hover { border-color: hsl(224,20%,28%); transform: translateY(-2px); }

.metric-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.metric-model { font-size: 11px; font-weight: 600; margin-bottom: 8px; }
.metric-model.orion-label  { color: var(--orion); }
.metric-model.aurora-label { color: var(--aurora); }
.metric-value { font-size: 28px; font-weight: 800; font-family: var(--font-mono); letter-spacing: -1px; }
.metric-unit  { font-size: 12px; color: var(--text-muted); margin-left: 4px; font-weight: 400; }
.metric-delta { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
.delta-good { color: var(--green); }
.delta-bad  { color: var(--red); }

/* ---- Sliders ---- */
.sliders-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.slider-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.slider-row label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}
.slider-row label span {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--orion);
  font-weight: 600;
}
.slider-row input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 5px;
  border-radius: 3px;
  background: var(--bg-surface);
  outline: none;
  cursor: pointer;
  border: 1px solid var(--border);
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--orion), var(--aurora));
  cursor: pointer;
  box-shadow: 0 0 8px hsl(210,80%,60%,0.4);
  transition: box-shadow 0.2s;
}
.slider-row input[type=range]::-webkit-slider-thumb:hover {
  box-shadow: 0 0 12px hsl(210,80%,60%,0.6);
}

/* ---- Live prediction display ---- */
.live-pred-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}
.live-pred-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
.live-orion-val  { font-size: 20px; font-weight: 700; font-family: var(--font-mono); color: var(--orion); }
.live-aurora-val { font-size: 32px; font-weight: 800; font-family: var(--font-mono); color: var(--aurora); }
.live-pred-unit  { font-size: 13px; color: var(--text-muted); }
.live-improvement-badge {
  padding: 4px 12px;
  background: hsl(145,70%,52%,0.1);
  border: 1px solid hsl(145,70%,52%,0.3);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
}

/* ---- Chart wrappers ---- */
.chart-wrap {
  width: 100%;
  height: 320px;
}
.chart-legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ---- Reservoir heatmap ---- */
.heatmap-wrap {
  overflow: hidden;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-surface);
  padding: 4px;
}
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(25, 1fr);
  gap: 2px;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 2px;
  transition: background-color 0.5s;
}
.heatmap-scale {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 10px;
  color: var(--text-muted);
}
.heatmap-scale-bar {
  flex: 1;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg,
    hsl(224, 35%, 15%),
    hsl(210, 80%, 30%),
    hsl(210, 90%, 60%),
    hsl(45, 95%, 60%)
  );
}

/* ---- Benchmark table ---- */
.bench-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.bench-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.bench-table td {
  padding: 10px 12px;
  border-bottom: 1px solid hsl(224,20%,14%);
  font-family: var(--font-mono);
  font-size: 12px;
}
.bench-table tr:last-child td { border-bottom: none; }
.bench-table tr.highlight td {
  background: hsl(210,80%,55%,0.06);
  color: var(--text-primary);
}
.bench-table tr.highlight-aurora td {
  background: hsl(270,70%,60%,0.08);
  color: var(--text-primary);
}
.bench-table tr:hover td { background: hsl(224,20%,14%); }
.model-name-cell { font-family: var(--font-body) !important; font-weight: 600; font-size: 12px !important; }
.badge-orion  { display: inline-block; padding: 2px 6px; background: hsl(210,80%,55%,0.15); color: var(--orion); border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 6px; font-family: var(--font-body) !important; letter-spacing: 0.5px; }
.badge-aurora { display: inline-block; padding: 2px 6px; background: hsl(270,70%,60%,0.15); color: var(--aurora); border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 6px; font-family: var(--font-body) !important; letter-spacing: 0.5px; }
.badge-best   { display: inline-block; padding: 2px 6px; background: hsl(45,90%,55%,0.15); color: var(--gold); border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 4px; font-family: var(--font-body) !important; }

/* ---- Grid contribution panel ---- */
.grid-panel {
  display: flex;
  align-items: center;
  gap: 24px;
}
.grid-donut-wrap {
  position: relative;
  flex-shrink: 0;
}
.grid-donut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.grid-pct { font-size: 22px; font-weight: 800; font-family: var(--font-mono); color: var(--aurora); }
.grid-pct-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.grid-stats {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.grid-stat-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.grid-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.grid-stat-value { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.grid-stat-bar-wrap { height: 4px; background: var(--bg-deep); border-radius: 2px; }
.grid-stat-bar      { height: 4px; border-radius: 2px; transition: width 0.6s ease; }

/* ---- Tooltip card ---- */
.tooltip-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  box-shadow: 0 8px 32px hsl(0,0%,0%,0.4);
}
.tooltip-label { color: var(--text-muted); font-size: 10px; margin-bottom: 4px; }
.tooltip-row   { display: flex; justify-content: space-between; gap: 16px; margin: 2px 0; }

/* ---- Stage info boxes ---- */
.stage-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.stage-info-box {
  padding: 16px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
}
.stage-info-box.orion-box  { border-left: 3px solid var(--orion); background: hsl(210,80%,55%,0.04); }
.stage-info-box.aurora-box { border-left: 3px solid var(--aurora); background: hsl(270,70%,60%,0.04); }
.stage-info-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.stage-info-title.orion-col  { color: var(--orion); }
.stage-info-title.aurora-col { color: var(--aurora); }
.stage-info-item { font-size: 11px; color: var(--text-secondary); padding: 3px 0; display: flex; gap: 6px; }
.stage-info-item::before { content: '›'; color: var(--text-muted); flex-shrink: 0; }

/* ---- Status bar ---- */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 11px;
  color: var(--text-secondary);
}
.status-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  flex-shrink: 0;
}
.status-indicator.running { background: var(--orion); box-shadow: 0 0 6px var(--orion); animation: blink 0.8s infinite; }
.status-indicator.idle    { background: var(--text-muted); box-shadow: none; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* ---- Animations ---- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease both; }

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.text-gradient {
  background: linear-gradient(90deg, var(--orion), var(--aurora), var(--gold), var(--orion));
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}

/* ---- Responsive ---- */
@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 860px) {
  .main { padding: 16px; }
  .header { padding: 12px 16px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .sliders-grid { grid-template-columns: 1fr; }
  .stage-info-grid { grid-template-columns: 1fr; }
  .pipeline-wrap { gap: 0; }
  .heatmap-grid { grid-template-columns: repeat(20, 1fr); }
}

/* ============================================================
   Live Forecast Hub Styles
   ============================================================ */

.header-tabs {
  display: flex;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  margin-left: 20px;
  align-items: center;
}

.tab-btn {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.tab-btn:hover {
  color: var(--text-secondary);
}

.tab-btn.active {
  color: var(--text-primary);
  background: hsl(224, 20%, 18%);
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  align-items: flex-end;
  margin-bottom: 24px;
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}

.settings-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.settings-field label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.settings-input-group {
  position: relative;
  display: flex;
  width: 100%;
}

.settings-input {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.settings-input:focus {
  border-color: var(--orion);
  box-shadow: 0 0 8px rgba(59, 158, 255, 0.15);
}

.btn-toggle-visibility {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
}

.btn-toggle-visibility:hover {
  color: var(--text-secondary);
}

.btn-fetch {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 9px 20px;
  font-size: 12px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--orion-dark), var(--aurora-dark));
  border: 1px solid var(--border);
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
  height: 36px;
  box-shadow: 0 4px 12px rgba(168, 85, 247, 0.15);
}

.btn-fetch:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(168, 85, 247, 0.3);
}

.btn-fetch:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.weather-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.weather-widget {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: transform 0.2s;
}

.weather-widget:hover {
  transform: translateY(-2px);
}

.weather-widget-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.weather-widget-val {
  font-size: 18px;
  font-weight: 800;
  font-family: var(--font-mono);
  color: var(--text-primary);
}

.weather-widget-sub {
  font-size: 10px;
  color: var(--text-muted);
}

.card-ai {
  border: 1px solid var(--aurora);
  background: linear-gradient(180deg, var(--bg-card) 0%, hsl(270, 45%, 9%) 100%);
  box-shadow: 0 8px 32px rgba(168, 85, 247, 0.05);
}

.ai-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: hsl(270, 70%, 60%, 0.12);
  border: 1px solid hsl(270, 70%, 60%, 0.25);
  border-radius: 20px;
  font-size: 9px;
  font-weight: 700;
  color: var(--aurora-glow);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.ai-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--aurora), var(--orion));
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
}

.ai-btn:hover:not(:disabled) {
  box-shadow: 0 6px 16px rgba(168, 85, 247, 0.35);
  transform: translateY(-1px);
}

.ai-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.ai-content {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  padding: 12px 0;
  border-top: 1px solid var(--border);
}

.ai-content h3 {
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 700;
  margin-top: 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ai-content h3::before {
  content: '⚡';
  color: var(--gold);
}

.ai-content p {
  margin-bottom: 12px;
}

.ai-content ul {
  padding-left: 20px;
  margin-bottom: 16px;
}

.ai-content li {
  margin-bottom: 6px;
}

.ai-content strong {
  color: var(--text-primary);
}

.skeleton-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px 0;
}

.skeleton-bar {
  height: 10px;
  background: linear-gradient(90deg, 
    var(--border) 25%, 
    hsl(224, 20%, 15%) 50%, 
    var(--border) 75%
  );
  background-size: 200% 100%;
  animation: loading-skeleton 1.5s infinite;
  border-radius: 4px;
}

@keyframes loading-skeleton {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.error-message {
  padding: 12px 16px;
  background: rgba(239, 68, 68, 0.08);
  border: 1px solid rgba(239, 68, 68, 0.25);
  color: var(--red);
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

// Inlined Mathematical Engines
// ================================================================
// ESN.js — Echo State Network (ORION Stage 1)
// Optimised for browser: N=40, typed Float64Arrays throughout
// ================================================================

// ---- Seeded RNG (reproducible, fast) ----
function seededRng(seed) {
  let s = (seed >>> 0) || 1;
  return () => {
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s >>> 0) / 4294967296 * 2 - 1;
  };
}

// ---- Build reservoir weight matrix with desired spectral radius ----
// Uses power-iteration to estimate dominant eigenvalue, then rescales
function buildReservoirMatrix(N, spectralRadius, seed) {
  const rng = seededRng(seed);
  const W = new Float64Array(N * N);

  // Sparse connectivity (~25% density)
  for (let i = 0; i < N * N; i++) {
    const r = rng();
    W[i] = Math.abs(r) > 0.75 ? rng() : 0;
  }

  // Power iteration (20 iters) to estimate spectral radius
  let v = new Float64Array(N);
  for (let i = 0; i < N; i++) v[i] = rng();
  let norm = 0;
  for (let i = 0; i < N; i++) norm += v[i] * v[i];
  norm = Math.sqrt(norm) || 1;
  for (let i = 0; i < N; i++) v[i] /= norm;

  for (let iter = 0; iter < 20; iter++) {
    const Wv = new Float64Array(N);
    for (let i = 0; i < N; i++) {
      let s = 0;
      const row = i * N;
      for (let j = 0; j < N; j++) s += W[row + j] * v[j];
      Wv[i] = s;
    }
    norm = 0;
    for (let i = 0; i < N; i++) norm += Wv[i] * Wv[i];
    norm = Math.sqrt(norm) || 1;
    for (let i = 0; i < N; i++) v[i] = Wv[i] / norm;
  }

  // Rayleigh quotient → approximate spectral radius
  let sr = 0;
  for (let i = 0; i < N; i++) {
    let s = 0;
    const row = i * N;
    for (let j = 0; j < N; j++) s += W[row + j] * v[j];
    sr += s * v[i];
  }
  sr = Math.abs(sr) || 1;

  const scale = spectralRadius / sr;
  for (let i = 0; i < N * N; i++) W[i] *= scale;
  return W;
}

// ---- Build input weight matrix ----
function buildInputMatrix(N, F, seed) {
  const rng = seededRng(seed);
  const W = new Float64Array(N * F);
  for (let i = 0; i < N * F; i++) W[i] = rng() * 0.5;
  return W;
}

// ---- Ridge regression via Cholesky on normal equations ----
// Solves (S'S + λI) w = S'y  →  uses Gaussian elimination on (N)×(N+1)
function ridgeRegression(S, Y, N, T, lambda) {
  // Build S'S (N×N) and S'y (N)
  const StS = new Float64Array(N * N);
  const Sty = new Float64Array(N);

  for (let t = 0; t < T; t++) {
    const st = S[t]; // length-N array
    for (let i = 0; i < N; i++) {
      Sty[i] += st[i] * Y[t];
      const rowI = i * N;
      for (let j = i; j < N; j++) {
        const val = st[i] * st[j];
        StS[rowI + j] += val;
        if (i !== j) StS[j * N + i] += val;
      }
    }
  }
  // Regularise diagonal
  for (let i = 0; i < N; i++) StS[i * N + i] += lambda;

  // Gaussian elimination with partial pivoting
  // Build augmented [StS | Sty] as plain arrays for speed
  const M = [];
  for (let i = 0; i < N; i++) {
    const row = new Float64Array(N + 1);
    const src = i * N;
    for (let j = 0; j < N; j++) row[j] = StS[src + j];
    row[N] = Sty[i];
    M.push(row);
  }

  for (let col = 0; col < N; col++) {
    // Find pivot
    let maxRow = col, maxVal = Math.abs(M[col][col]);
    for (let row = col + 1; row < N; row++) {
      const v = Math.abs(M[row][col]);
      if (v > maxVal) { maxVal = v; maxRow = row; }
    }
    if (maxRow !== col) { const tmp = M[col]; M[col] = M[maxRow]; M[maxRow] = tmp; }

    const pivot = M[col][col];
    if (Math.abs(pivot) < 1e-14) continue;

    for (let row = col + 1; row < N; row++) {
      const f = M[row][col] / pivot;
      if (f === 0) continue;
      for (let j = col; j <= N; j++) M[row][j] -= f * M[col][j];
    }
  }

  // Back substitution
  const x = new Float64Array(N);
  for (let i = N - 1; i >= 0; i--) {
    let s = M[i][N];
    for (let j = i + 1; j < N; j++) s -= M[i][j] * x[j];
    x[i] = s / (M[i][i] || 1e-14);
  }
  return x;
}

// ================================================================
// ORION Engine — N=40 neurons for smooth browser performance
// ================================================================
class ORIONEngine {
  constructor(cfg = {}) {
    this.N   = cfg.N   || 40;
    this.F   = cfg.F   || 6;
    this.sr  = cfg.sr  || 0.9;
    this.a   = cfg.a   || 0.3;      // leaking rate
    this.beta= cfg.beta|| 0.05;     // oscillation amplitude
    this.omega = 2 * Math.PI / 24;  // daily cycle
    this.phi   = 0;
    this.lambda= cfg.lambda || 1e-3;

    this.W_res = buildReservoirMatrix(this.N, this.sr, 42);
    this.W_in  = buildInputMatrix(this.N, this.F, 99);
    this.W_out = null;
    this.state = new Float64Array(this.N);
  }

  featureVector(row, ns) {
    const n = (v, k) => (ns[k].max - ns[k].min) > 0
      ? (v - ns[k].min) / (ns[k].max - ns[k].min) : 0;
    return [
      n(row.irr, 'irr'), n(row.tmp, 'tmp'),
      n(row.hum, 'hum'), n(row.wnd, 'wnd'),
      Math.sin(2 * Math.PI * row.h / 24),
      Math.cos(2 * Math.PI * row.h / 24),
    ];
  }

  _step(x, t) {
    const N = this.N, W = this.W_res, Wi = this.W_in, F = this.F;
    const osc = this.beta * Math.sin(this.omega * t + this.phi);
    const newS = new Float64Array(N);

    for (let i = 0; i < N; i++) {
      let s = osc;
      const rowW = i * N, rowI = i * F;
      for (let j = 0; j < N; j++) s += W[rowW + j] * this.state[j];
      for (let j = 0; j < F; j++) s += Wi[rowI + j] * x[j];
      newS[i] = (1 - this.a) * this.state[i] + this.a * Math.tanh(s);
    }
    this.state = newS;
    return newS;
  }

  collectStates(data, ns) {
    this.state = new Float64Array(this.N);
    return data.map((row, t) => this._step(this.featureVector(row, ns), t));
  }

  train(data, ns) {
    const states = this.collectStates(data, ns);
    const Y = data.map(d => d.pwr / (ns.pwr.max || 1));
    this.W_out = ridgeRegression(states, Y, this.N, data.length, this.lambda);
    return states;
  }

  predict(data, ns) {
    if (!this.W_out) return data.map(() => 0);
    const states = this.collectStates(data, ns);
    const Wo = this.W_out, mx = ns.pwr.max || 1;
    return states.map(s => {
      let v = 0;
      for (let j = 0; j < this.N; j++) v += s[j] * Wo[j];
      return Math.max(0, v * mx);
    });
  }

  predictOne(feat, ns, t = 12) {
    if (!this.W_out) return 0;
    const s = this._step(feat, t);
    let v = 0;
    for (let j = 0; j < this.N; j++) v += s[j] * this.W_out[j];
    return Math.max(0, v * (ns.pwr.max || 1));
  }

  getSnapshot() { return Array.from(this.state); }
}

// ---- Normalization stats ----
function computeNormStats(data) {
  const stats = {};
  for (const k of ['irr','tmp','hum','wnd','pwr']) {
    const vals = data.map(d => d[k]).filter(Number.isFinite);
    let mn = Infinity, mx = -Infinity, sm = 0;
    for (const v of vals) { if (v < mn) mn = v; if (v > mx) mx = v; sm += v; }
    stats[k] = { min: mn, max: mx, mean: sm / (vals.length || 1) };
  }
  return stats;
}

window.ORIONEngine     = ORIONEngine;
window.computeNormStats = computeNormStats;

// ================================================================
// aurora.js — AURORA Adaptive Refinement Stage (fast version)
// ================================================================

class AURORAEngine {
  constructor(cfg = {}) {
    this.windowSize       = cfg.windowSize       || 24;
    this.radiantScale     = cfg.radiantScaleFactor || 0.7;
    this.adaptiveGain     = 1.0;
    this.weights          = null; // 8-element array (tiny, fast to solve)
  }

  _feat(row, orionPred, ns) {
    const n = (v, k) => (ns[k].max - ns[k].min) > 0
      ? (v - ns[k].min) / (ns[k].max - ns[k].min) : 0;
    return [
      orionPred / (ns.pwr.max || 1),
      n(row.irr, 'irr'), n(row.tmp, 'tmp'),
      n(row.hum, 'hum'), n(row.wnd, 'wnd'),
      Math.sin(2 * Math.PI * row.h / 24),
      Math.cos(2 * Math.PI * row.h / 24),
      1.0, // bias
    ];
  }

  _variance(arr) {
    if (!arr.length) return 0;
    let sm = 0;
    for (const v of arr) sm += v;
    const mn = sm / arr.length;
    let v2 = 0;
    for (const v of arr) v2 += (v - mn) ** 2;
    return v2 / arr.length;
  }

  // Tiny 8×8 least-squares — runs in microseconds
  _lsq(X, Y) {
    const m = X[0].length, n = X.length;
    const XtX = [];
    for (let i = 0; i < m; i++) {
      XtX.push(new Float64Array(m));
      for (let j = 0; j < m; j++) {
        let s = i === j ? 1e-3 : 0; // regularise
        for (let t = 0; t < n; t++) s += X[t][i] * X[t][j];
        XtX[i][j] = s;
      }
    }
    const XtY = new Float64Array(m);
    for (let i = 0; i < m; i++)
      for (let t = 0; t < n; t++)
        XtY[i] += X[t][i] * Y[t];

    // Gaussian elimination (8×8 — trivial)
    const M = XtX.map((row, i) => { const r = Array.from(row); r.push(XtY[i]); return r; });
    for (let col = 0; col < m; col++) {
      let mx = col;
      for (let r = col + 1; r < m; r++) if (Math.abs(M[r][col]) > Math.abs(M[mx][col])) mx = r;
      [M[col], M[mx]] = [M[mx], M[col]];
      const p = M[col][col] || 1e-12;
      for (let r = col + 1; r < m; r++) {
        const f = M[r][col] / p;
        for (let j = col; j <= m; j++) M[r][j] -= f * M[col][j];
      }
    }
    const x = new Float64Array(m);
    for (let i = m - 1; i >= 0; i--) {
      let s = M[i][m];
      for (let j = i + 1; j < m; j++) s -= M[i][j] * x[j];
      x[i] = s / (M[i][i] || 1e-12);
    }
    return x;
  }

  train(data, orionPreds, ns) {
    const X = data.map((row, i) => this._feat(row, orionPreds[i], ns));
    const residuals = data.map((d, i) => d.pwr - orionPreds[i]);
    this.weights = this._lsq(X, residuals);

    const varRes   = this._variance(residuals);
    const varOrion = this._variance(orionPreds);
    this.adaptiveGain = Math.min(1.0, varRes / (varOrion + 1e-6)) * this.radiantScale;
  }

  predict(data, orionPreds, ns) {
    if (!this.weights) return [...orionPreds];
    const allPwr = data.map(d => d.pwr);
    const globalVar = this._variance(allPwr);

    return data.map((row, i) => {
      const x = this._feat(row, orionPreds[i], ns);
      let corr = 0;
      for (let j = 0; j < this.weights.length; j++) corr += x[j] * this.weights[j];
      corr *= ns.pwr.max || 1;

      // Radiant scaling: amplify correction when local error is high
      const wStart = Math.max(0, i - this.windowSize);
      const localPwr = allPwr.slice(wStart, i + 1);
      const localVar = this._variance(localPwr);
      const rScale   = Math.min(2, Math.sqrt(localVar / (globalVar + 1e-6)));
      return Math.max(0, orionPreds[i] + corr * rScale * this.adaptiveGain);
    });
  }

  predictOne(feat8, orionPred, ns) {
    if (!this.weights) return orionPred;
    let corr = 0;
    for (let j = 0; j < this.weights.length; j++) corr += feat8[j] * this.weights[j];
    corr *= (ns.pwr.max || 1) * this.adaptiveGain * 0.3;
    return Math.max(0, orionPred + corr);
  }
}

window.AURORAEngine = AURORAEngine;

// ================================================================
// metrics.js — Evaluation metrics + benchmark reference data
// ================================================================

function computeRMSE(actual, predicted) {
  const n = actual.length;
  const mse = actual.reduce((s, a, i) => s + (a - predicted[i]) ** 2, 0) / n;
  return Math.sqrt(mse);
}

function computeMAE(actual, predicted) {
  const n = actual.length;
  return actual.reduce((s, a, i) => s + Math.abs(a - predicted[i]), 0) / n;
}

function computeMAPE(actual, predicted) {
  let count = 0, sum = 0;
  for (let i = 0; i < actual.length; i++) {
    if (actual[i] > 1e-3) { // Avoid division by near-zero
      sum += Math.abs((actual[i] - predicted[i]) / actual[i]);
      count++;
    }
  }
  return count > 0 ? (sum / count) * 100 : 0;
}

function computeR2(actual, predicted) {
  const mean = actual.reduce((s, v) => s + v, 0) / actual.length;
  const ss_tot = actual.reduce((s, v) => s + (v - mean) ** 2, 0);
  const ss_res = actual.reduce((s, v, i) => s + (v - predicted[i]) ** 2, 0);
  return 1 - ss_res / (ss_tot || 1);
}

function computeBaselinePredictions(data) {
  const mean = data.reduce((s, d) => s + d.pwr, 0) / data.length;
  return data.map(() => mean);
}

// ---- Paper benchmark reference values (from the paper) ----
// Normalized to kW scale relative to the UCI and AEP datasets
const PAPER_BENCHMARKS = {
  uci: [
    { model: 'VGG16',               rmse: 8.72,  mae: 5.61, mape: 4.82 },

    { model: 'Transformer-TFT',     rmse: 4.93,  mae: 2.98, mape: 2.18 },
    { model: 'ORION only',          rmse: 4.12,  mae: 2.41, mape: 1.87, isOrion: true },
    { model: 'ORION + AURORA',      rmse: 3.50,  mae: 2.00, mape: 1.50, isAurora: true },
  ],
  aep: [
    { model: 'VGG16',               rmse: 9.88,  mae: 6.44, mape: 5.73 },
    { model: 'ResNet50',            rmse: 8.95,  mae: 5.82, mape: 5.14 },
    { model: 'EfficientNet-B0',     rmse: 8.43,  mae: 5.41, mape: 4.72 },
    { model: 'Inception-v3',        rmse: 8.12,  mae: 5.17, mape: 4.43 },
    { model: 'DenseNet121',         rmse: 7.81,  mae: 4.93, mape: 4.12 },
    { model: 'CNN-LSTM Hybrid',     rmse: 7.28,  mae: 4.56, mape: 3.68 },
    { model: 'Attention-LSTM',      rmse: 6.71,  mae: 4.14, mape: 3.22 },
    { model: 'Transformer-TFT',     rmse: 5.62,  mae: 3.43, mape: 2.64 },
    { model: 'ORION only',          rmse: 4.68,  mae: 2.88, mape: 2.21, isOrion: true },
    { model: 'ORION + AURORA',      rmse: 4.00,  mae: 2.50, mape: 2.00, isAurora: true },
  ]
};

// Scale metrics to match dataset magnitudes
// Paper reports % errors — we scale RMSE/MAE to kW units of each dataset
function scaleMetricsToDataset(metrics, normStats) {
  const scale = normStats.pwr.max / 100; // rough scaling
  return {
    rmse: metrics.rmse * scale,
    mae:  metrics.mae  * scale,
    mape: metrics.mape, // % stays same
  };
}

window.computeRMSE  = computeRMSE;
window.computeMAE   = computeMAE;
window.computeMAPE  = computeMAPE;
window.computeR2    = computeR2;
window.computeBaselinePredictions = computeBaselinePredictions;
window.PAPER_BENCHMARKS = PAPER_BENCHMARKS;
window.scaleMetricsToDataset = scaleMetricsToDataset;

      if (!response.ok) {
        const errJson = await response.json();
        throw new Error(errJson.error?.message || `HTTP ${response.status} Error`);
      }

      const resData = await response.json();
      const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) {
        throw new Error('Gemini API returned an empty response.');
      }

      setAiReport(text);

    } catch (err) {
      console.error('[GEMINI] Fetch failed:', err);
      setAiError(err.message || 'Failed to generate AI advice. Please check your API key and connection.');
    } finally {
      setAiLoading(false);
    }
  }, [geminiKey, liveForecastResults, lat, lon, getMockAiReport]);



  // ---- Train & Run Model ----
  const runModel = useCallback(async () => {
    if (modelStatus === 'training') return;
    setModelStatus('training');
    setProgress(0);
    setResults(null);
    setStatusMsg('Initializing ORION reservoir…');

    // Use setTimeout to yield to renderer between stages
    await new Promise(r => setTimeout(r, 50));

    const data = rawData;
    const ns   = normStats;
    normRef.current = ns;

    // Stage 1 — ORION
    setPipelineStage('input');
    setProgress(10);
    setStatusMsg('Building Echo State Network reservoir (40 neurons, SR=0.9)…');
    await new Promise(r => setTimeout(r, 80));

    const orion = new window.ORIONEngine({
      N: 40, F: 6, sr: 0.9,
      a: 0.3, beta: 0.05, lambda: 1e-3
    });
    orionRef.current = orion;

    setPipelineStage('orion');
    setProgress(30);
    setStatusMsg('ORION: Running reservoir state collection…');
    await new Promise(r => setTimeout(r, 80));

    // Split 80/20 train/test
    const splitIdx = Math.floor(data.length * 0.8);
    const trainData = data.slice(0, splitIdx);
    const testData  = data.slice(splitIdx);

    orion.train(trainData, ns);

    setProgress(55);
    setStatusMsg('ORION: Generating initial predictions via ridge regression readout…');
    await new Promise(r => setTimeout(r, 60));

    const orionAllPreds  = orion.predict(data, ns);
    const orionTestPreds = orionAllPreds.slice(splitIdx);

    // Capture reservoir snapshot
    setReservoirStates(orion.getSnapshot());

    // Stage 2 — AURORA
    setPipelineStage('aurora');
    setProgress(65);
    setStatusMsg('AURORA: Training adaptive correction layer…');
    await new Promise(r => setTimeout(r, 80));

    const aurora = new window.AURORAEngine({ windowSize: 24, radiantScaleFactor: 0.7 });
    auroraRef.current = aurora;

    aurora.train(trainData, orionAllPreds.slice(0, splitIdx), ns);

    setProgress(80);
    setStatusMsg('AURORA: Applying radiant adaptation module…');
    await new Promise(r => setTimeout(r, 80));

    const auroraAllPreds  = aurora.predict(data, orionAllPreds, ns);
    const auroraTestPreds = auroraAllPreds.slice(splitIdx);

    // Baseline
    const baselinePreds = window.computeBaselinePredictions(testData);
    const actuals       = testData.map(d => d.pwr);

    // Metrics
    setPipelineStage('output');
    setProgress(92);
    setStatusMsg('Computing RMSE, MAE, MAPE metrics…');
    await new Promise(r => setTimeout(r, 80));

    const metrics = {
      baseline: {
        rmse: window.computeRMSE(actuals, baselinePreds),
        mae:  window.computeMAE(actuals, baselinePreds),
        mape: window.computeMAPE(actuals, baselinePreds),
        r2:   window.computeR2(actuals, baselinePreds),
      },
      orion: {
        rmse: window.computeRMSE(actuals, orionTestPreds),
        mae:  window.computeMAE(actuals, orionTestPreds),
        mape: window.computeMAPE(actuals, orionTestPreds),
        r2:   window.computeR2(actuals, orionTestPreds),
      },
      aurora: {
        rmse: window.computeRMSE(actuals, auroraTestPreds),
        mae:  window.computeMAE(actuals, auroraTestPreds),
        mape: window.computeMAPE(actuals, auroraTestPreds),
        r2:   window.computeR2(actuals, auroraTestPreds),
      }
    };

    // Build chart data (show all test points, sampled for perf)
    const CHART_MAX = 120;
    const step  = Math.max(1, Math.floor(testData.length / CHART_MAX));
    const chartData = testData
      .filter((_, i) => i % step === 0)
      .map((row, i) => {
        const ti = i * step;
        return {
          idx:      i,
          label:    `${row.h}h d${row.doy}`,
          actual:   Math.round(actuals[ti]),
          orion:    Math.round(orionTestPreds[ti]),
          aurora:   Math.round(auroraTestPreds[ti]),
          baseline: Math.round(baselinePreds[ti]),
        };
      });

    // AEP grid contribution (only for AEP)
    let gridData = null;
    if (dataset === 'aep') {
      const recentData = testData.slice(-24);
      const avgSolar = auroraTestPreds.slice(-24).reduce((s, v) => s + v, 0) / 24 / 1000;
      const avgDemand = recentData.reduce((s, d) => s + (d.dem || 10000), 0) / 24 / 1000;
      gridData = {
        solarMW:   avgSolar,
        demandMW:  avgDemand,
        pct:       Math.min(100, (avgSolar / (avgDemand || 1)) * 100),
        otherMW:   Math.max(0, avgDemand - avgSolar),
      };
    } else {
      // UCI — estimate based on typical grid
      const avgSolar = auroraTestPreds.slice(-24).reduce((s, v) => s + v, 0) / 24 / 1000;
      const avgDemand = 8.0; // typical 8 GW
      gridData = {
        solarMW:  avgSolar,
        demandMW: avgDemand,
        pct:      Math.min(100, (avgSolar / avgDemand) * 100),
        otherMW:  Math.max(0, avgDemand - avgSolar),
      };
    }

    setResults({ metrics, chartData, gridData, splitIdx, data, orionAllPreds, auroraAllPreds });
    setPipelineStage('done');
    setProgress(100);
    setModelStatus('done');
    setStatusMsg(`Model complete · Test set: ${testData.length} samples · AURORA RMSE: ${metrics.aurora.rmse.toFixed(2)} kW`);

  }, [rawData, normStats, dataset, modelStatus]);

  // ---- Live prediction from sliders ----
  useEffect(() => {
    if (!orionRef.current || !auroraRef.current || !normRef.current) return;
    const ns = normRef.current;
    const orion = orionRef.current;
    const aurora = auroraRef.current;

    const n = (v, k) => (ns[k].max - ns[k].min) > 0 ? (v - ns[k].min) / (ns[k].max - ns[k].min) : 0;
    const features = [
      n(liveInputs.irr, 'irr'), n(liveInputs.tmp, 'tmp'),
      n(liveInputs.hum, 'hum'), n(liveInputs.wnd, 'wnd'),
      Math.sin(2 * Math.PI * liveInputs.hour / 24),
      Math.cos(2 * Math.PI * liveInputs.hour / 24),
    ];

    const cloudFactor = Math.max(0, 1 - liveInputs.cc * 0.8);
    const orionPred  = orion.predictOne(features, ns, liveInputs.hour) * cloudFactor;
    // AURORA feat8: [orion_norm, irr_norm, tmp_norm, hum_norm, wnd_norm, sin, cos, 1]
    const auroraFeatures = [orionPred / (ns.pwr.max || 1), ...features, 1.0];
    const auroraPred = aurora.predictOne(auroraFeatures, orionPred, ns);

    setLivePred({ orion: orionPred, aurora: Math.max(0, auroraPred) });
  }, [liveInputs, modelStatus]);

  // ---- Dataset switch resets model ----
  useEffect(() => {
    setModelStatus('idle');
    setPipelineStage('idle');
    setProgress(0);
    setResults(null);
    setLivePred(null);
    setReservoirStates(null);
    setStatusMsg('Dataset changed — click Run Model');
    orionRef.current  = null;
    auroraRef.current = null;
    normRef.current   = null;
  }, [dataset]);

  // ---- CSV Export ----
  function exportCSV() {
    if (!results) return;
    const rows = results.chartData.map(d =>
      `${d.label},${d.actual},${d.orion},${d.aurora},${d.baseline}`
    );
    const csv = 'timestamp,actual_kw,orion_kw,aurora_kw,baseline_kw\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `orion_aurora_${dataset}_predictions.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ---- Paper targets for dataset ----
  const targets = dataset === 'uci'
    ? { rmse: 3.50, mae: 2.00, mape: 1.50 }
    : { rmse: 4.00, mae: 2.50, mape: 2.00 };

  const benchmarks = window.PAPER_BENCHMARKS[dataset];

  // ---- Donut chart data for grid panel ----
  const donutData = results ? [
    { name: 'Solar', value: Math.round(results.gridData.pct) },
    { name: 'Other', value: Math.round(100 - results.gridData.pct) },
  ] : [];
  const DONUT_COLORS = [C.aurora, '#1e2a3a'];

  // ---- Slider config ----
  const sliders = [
    { key: 'irr',  label: 'Solar Irradiance',  unit: 'W/m²', min: 0,   max: 1000, step: 5 },
    { key: 'tmp',  label: 'Temperature',        unit: '°C',   min: -10, max: 40,   step: 0.5 },
    { key: 'hum',  label: 'Humidity',           unit: '%',    min: 0,   max: 100,  step: 1 },
    { key: 'wnd',  label: 'Wind Speed',         unit: 'm/s',  min: 0,   max: 20,   step: 0.5 },
    { key: 'hour', label: 'Hour of Day',        unit: 'h',    min: 0,   max: 23,   step: 1 },
    { key: 'cc',   label: 'Cloud Cover',        unit: '',     min: 0,   max: 1,    step: 0.01 },
  ];

  const improvement = results
    ? ((results.metrics.orion.rmse - results.metrics.aurora.rmse) / results.metrics.orion.rmse * 100).toFixed(1)
    : null;

  return (
    <div>
      {/* ---- Header ---- */}
      <header className="header">
        <div className="header-logo">
          <div className="logo-icon">☀️</div>
          <div>
            <div className="logo-text">
              <span className="orion">ORION</span>
              <span className="sep">–</span>
              <span className="aurora">AURORA</span>
            </div>
            <div className="header-subtitle">Dual-Model Solar Power Forecasting System</div>
          </div>

          {/* Sub-page Navigation Tabs */}
          <div className="header-tabs">
            <button
              className={`tab-btn ${activeTab === 'sandbox' ? 'active' : ''}`}
              onClick={() => setActiveTab('sandbox')}
            >
              📊 Sandbox Simulation
            </button>
            <button
              className={`tab-btn ${activeTab === 'live' ? 'active' : ''}`}
              onClick={() => setActiveTab('live')}
            >
              📡 Live Forecast Hub
            </button>
          </div>
        </div>
        <div className="header-actions">
          {activeTab === 'sandbox' && (
            <div className="dataset-toggle">
              <button id="btn-uci" className={dataset === 'uci' ? 'active' : ''} onClick={() => setDataset('uci')}>
                UCI Solar
              </button>
              <button id="btn-aep" className={dataset === 'aep' ? 'active' : ''} onClick={() => setDataset('aep')}>
                AEP Grid
              </button>
            </div>
          )}
          <button className="btn-export" onClick={exportCSV} disabled={!results} id="btn-export">
            ⬇ Export CSV
          </button>
          {activeTab === 'sandbox' && (
            <button
              id="btn-run-model"
              className={`btn-run ${modelStatus === 'training' ? 'running' : ''}`}
              onClick={runModel}
              disabled={modelStatus === 'training'}
            >
              {modelStatus === 'training' ? '⚡ Running…' : modelStatus === 'done' ? '↺ Re-Run' : '▶ Run Model'}
            </button>
          )}
        </div>
      </header>

      {/* ---- Main ---- */}
      <main className="main">
        {activeTab === 'sandbox' ? (
          <>
            {/* ---- Status bar ---- */}
            <div className="status-bar">
              <div className={`status-indicator ${modelStatus === 'training' ? 'running' : modelStatus === 'done' ? '' : 'idle'}`} />
              <span>{statusMsg}</span>
              {modelStatus === 'training' && (
                <div style={{ flex: 1, marginLeft: 12 }}>
                  <div className="progress-bar-wrap">
                    <div className="progress-bar-fill" style={{ width: `${progress}%` }} />
                  </div>
                </div>
              )}
              {modelStatus === 'done' && improvement && (
                <span style={{ marginLeft: 'auto', color: 'var(--green)', fontSize: 11, fontWeight: 600 }}>
                  AURORA improved RMSE by {improvement}% vs ORION alone
                </span>
              )}
            </div>

            {/* ---- Pipeline Visualization ---- */}
            <div className="card fade-in">
              <div className="card-header">
                <div className="card-title">
                  <div className="dot dot-orion" />
                  Pipeline Architecture
                </div>
                <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  {dataset === 'uci' ? 'UCI Solar Dataset' : 'AEP Grid Dataset'} · {rawData?.length} samples
                </span>
              </div>

              <div className="pipeline-wrap">
                {/* Input */}
                <div className="pipeline-stage">
                  <div className={`pipeline-box stage-input ${['input','orion','aurora','output','done'].includes(pipelineStage) ? 'active' : ''}`}>
                    <div className="stage-icon">📡</div>
                    <div className="stage-name">Raw Input</div>
                    <div className="stage-sub">irr·tmp·hum·wnd·h</div>
                  </div>
                  <div className="pipeline-label">6 features + normalization</div>
                </div>

                <div className={`pipeline-arrow ${['orion','aurora','output','done'].includes(pipelineStage) ? 'lit' : ''}`}>→</div>

                {/* ORION */}
                <div className="pipeline-stage">
                  <div className={`pipeline-box stage-orion ${['orion','aurora','output','done'].includes(pipelineStage) ? 'active' : ''}`}>
                    <div className="stage-icon">🔵</div>
                    <div className="stage-name">ORION</div>
                    <div className="stage-sub">ESN·TFT·Readout</div>
                  </div>
                  <div className="pipeline-label">100-neuron reservoir + ridge regression</div>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, marginTop: -18 }}>
                  <div className={`pipeline-arrow ${['aurora','output','done'].includes(pipelineStage) ? 'lit' : ''}`}>→</div>
                  <div style={{ fontSize: 9, color: 'var(--text-muted)', textAlign: 'center', maxWidth: 80 }}>
                    Initial forecast + reservoir states
                  </div>
                </div>

                {/* AURORA */}
                <div className="pipeline-stage">
                  <div className={`pipeline-box stage-aurora ${['aurora','output','done'].includes(pipelineStage) ? 'active aurora-active' : ''}`}>
                    <div className="stage-icon">🟣</div>
                    <div className="stage-name">AURORA</div>
                    <div className="stage-sub">Adaptive·Radiant</div>
                  </div>
                  <div className="pipeline-label">Adaptive gain + windowed correction</div>
                </div>

                <div className={`pipeline-arrow ${['output','done'].includes(pipelineStage) ? 'lit' : ''}`}>→</div>

                {/* Output */}
                <div className="pipeline-stage">
                  <div className={`pipeline-box stage-output ${['output','done'].includes(pipelineStage) ? 'active output-active' : ''}`}>
                    <div className="stage-icon">⚡</div>
                    <div className="stage-name">Forecast</div>
                    <div className="stage-sub">kW · ±error</div>
                  </div>
                  <div className="pipeline-label">Final solar PV power prediction</div>
                </div>
              </div>

              {/* Stage info */}
              <div className="stage-info-grid" style={{ marginTop: 20 }}>
                <div className="stage-info-box orion-box">
                  <div className="stage-info-title orion-col">⚙ ORION Components</div>
                  <div className="stage-info-item">Echo State Network — 100×100 reservoir, SR=0.9</div>
                  <div className="stage-info-item">Oscillatory modulation β·sin(ωt+φ) for cyclic patterns</div>
                  <div className="stage-info-item">Leaking rate α=0.3 for temporal smoothing</div>
                  <div className="stage-info-item">Ridge regression readout (λ=1e-4) — closed-form</div>
                  <div className="stage-info-item">Captures short-term spikes + daily arcs</div>
                </div>
                <div className="stage-info-box aurora-box">
                  <div className="stage-info-title aurora-col">⚙ AURORA Components</div>
                  <div className="stage-info-item">Adaptive gain correction layer (8 features + bias)</div>
                  <div className="stage-info-item">Radiant adaptation: windowed variance scaling</div>
                  <div className="stage-info-item">24-hour rolling window for local uncertainty estimate</div>
                  <div className="stage-info-item">Corrects for non-stationarity & weather regime drift</div>
                  <div className="stage-info-item">Improves ORION output at cloud burst onset, dawn/dusk</div>
                </div>
              </div>
            </div>

            {/* ---- Live Input Panel ---- */}
            <div className="card fade-in">
              <div className="card-header">
                <div className="card-title">
                  <div className="dot dot-green" />
                  Live Input Panel
                  {modelStatus !== 'done' && (
                    <span style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 400, marginLeft: 8 }}>
                      (Run the model first to enable predictions)
                    </span>
                  )}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  Adjust sliders → predictions update in real-time
                </div>
              </div>

              <div style={{ display: 'flex', gap: 24, alignItems: 'stretch' }}>
                <div className="sliders-grid" style={{ flex: 1 }}>
                  {sliders.map(s => (
                    <div className="slider-row" key={s.key} id={`slider-${s.key}`}>
                      <label>
                        {s.label}
                        <span>{liveInputs[s.key]}{s.unit}</span>
                      </label>
                      <input
                        type="range"
                        min={s.min} max={s.max} step={s.step}
                        value={liveInputs[s.key]}
                        onChange={e => setLiveInputs(prev => ({ ...prev, [s.key]: parseFloat(e.target.value) }))}
                      />
                    </div>
                  ))}
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 12, minWidth: 200 }}>
                  <div className="live-pred-wrap">
                    <div className="live-pred-label">ORION Initial Forecast</div>
                    <div className="live-orion-val">
                      {livePred ? livePred.orion.toFixed(0) : '---'}
                      <span style={{ fontSize: 14, color: 'var(--text-muted)', marginLeft: 4 }}>kW</span>
                    </div>
                  </div>
                  <div className="live-pred-wrap" style={{ borderColor: 'hsl(270,50%,30%)' }}>
                    <div className="live-pred-label">AURORA Refined Forecast</div>
                    <div className="live-aurora-val">
                      {livePred ? livePred.aurora.toFixed(0) : '---'}
                      <span style={{ fontSize: 14, color: 'var(--text-muted)', marginLeft: 4 }}>kW</span>
                    </div>
                    {livePred && livePred.aurora !== livePred.orion && (
                      <div className="live-improvement-badge">
                        {livePred.aurora > livePred.orion
                          ? `+${(livePred.aurora - livePred.orion).toFixed(0)} kW correction`
                          : `${(livePred.aurora - livePred.orion).toFixed(0)} kW correction`}
                      </div>
                    )}
                  </div>
                  <div style={{
                    padding: '12px 16px', background: 'var(--bg-surface)',
                    border: '1px solid var(--border)', borderRadius: 12,
                    fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.6
                  }}>
                    <div style={{ fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4 }}>Feature Vector</div>
                    <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>
                      irr={liveInputs.irr}<br/>
                      tmp={liveInputs.tmp}°C · hum={liveInputs.hum}%<br/>
                      wnd={liveInputs.wnd} m/s · cc={liveInputs.cc}<br/>
                      h_sin={Math.sin(2*Math.PI*liveInputs.hour/24).toFixed(3)}<br/>
                      h_cos={Math.cos(2*Math.PI*liveInputs.hour/24).toFixed(3)}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* ---- Results ---- */}
            {results && (
              <>
                {/* ---- Metrics Dashboard ---- */}
                <div className="card fade-in">
                  <div className="card-header">
                    <div className="card-title">
                      <div className="dot dot-gold" />
                      Metrics Dashboard
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                      Test set · {Math.floor(rawData.length * 0.2)} samples · vs paper targets
                    </div>
                  </div>

                  <div className="grid-3" style={{ marginBottom: 20 }}>
                    {/* RMSE */}
                    <div>
                      <div className="section-label">RMSE (kW)</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <MetricCard label="RMSE" modelLabel="Baseline (Mean)" value={results.metrics.baseline.rmse} unit="kW" variant="baseline" />
                        <MetricCard
                          label="RMSE" modelLabel="ORION Stage 1" value={results.metrics.orion.rmse} unit="kW"
                          delta={results.metrics.orion.rmse - results.metrics.baseline.rmse} deltaLabel="vs baseline"
                          variant="orion"
                        />
                        <MetricCard
                          label="RMSE" modelLabel="ORION + AURORA" value={results.metrics.aurora.rmse} unit="kW"
                          delta={results.metrics.aurora.rmse - results.metrics.orion.rmse} deltaLabel="vs ORION"
                          variant="aurora"
                        />
                      </div>
                    </div>
                    {/* MAE */}
                    <div>
                      <div className="section-label">MAE (kW)</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <MetricCard label="MAE" modelLabel="Baseline (Mean)" value={results.metrics.baseline.mae} unit="kW" variant="baseline" />
                        <MetricCard
                          label="MAE" modelLabel="ORION Stage 1" value={results.metrics.orion.mae} unit="kW"
                          delta={results.metrics.orion.mae - results.metrics.baseline.mae} deltaLabel="vs baseline"
                          variant="orion"
                        />
                        <MetricCard
                          label="MAE" modelLabel="ORION + AURORA" value={results.metrics.aurora.mae} unit="kW"
                          delta={results.metrics.aurora.mae - results.metrics.orion.mae} deltaLabel="vs ORION"
                          variant="aurora"
                        />
                      </div>
                    </div>
                    {/* MAPE */}
                    <div>
                      <div className="section-label">MAPE (%)</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <MetricCard label="MAPE" modelLabel="Baseline (Mean)" value={results.metrics.baseline.mape} unit="%" variant="baseline" />
                        <MetricCard
                          label="MAPE" modelLabel="ORION Stage 1" value={results.metrics.orion.mape} unit="%"
                          delta={results.metrics.orion.mape - results.metrics.baseline.mape} deltaLabel="vs baseline"
                          variant="orion"
                        />
                        <MetricCard
                          label="MAPE" modelLabel="ORION + AURORA" value={results.metrics.aurora.mape} unit="%"
                          delta={results.metrics.aurora.mape - results.metrics.orion.mape} deltaLabel="vs ORION"
                          variant="aurora"
                        />
                      </div>
                    </div>
                  </div>

                  {/* Paper targets comparison */}
                  <div style={{
                    padding: '14px 18px', borderRadius: 12,
                    background: 'hsl(45,50%,30%,0.08)', border: '1px solid hsl(45,50%,30%,0.2)',
                    display: 'flex', gap: 32, flexWrap: 'wrap', alignItems: 'center'
                  }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--gold)', letterSpacing: 1, textTransform: 'uppercase' }}>
                      📄 Paper Targets
                    </div>
                    {[['RMSE', targets.rmse, 'kW'], ['MAE', targets.mae, 'kW'], ['MAPE', targets.mape, '%']].map(([k, v, u]) => (
                      <div key={k} style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                        <div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1 }}>{k}</div>
                        <div style={{ fontFamily: 'JetBrains Mono, monospace', fontWeight: 700, color: 'var(--gold)' }}>
                          {v}{u}
                        </div>

                </div>
              </div>
            )}

            {/* Setup prompt card if weather forecast is not loaded yet */}
            {!currentWeather && (
              <div className="card fade-in" style={{ textAlign: 'center', padding: '48px 24px' }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>📡</div>
                <h2 className="text-gradient" style={{ fontSize: 24, fontWeight: 800, marginBottom: 12 }}>
                  Live Solar Forecasting Hub
                </h2>
                <p style={{ color: 'var(--text-secondary)', fontSize: 13, maxWidth: 520, margin: '0 auto 20px', lineHeight: 1.6 }}>
                  Enter your weather API key and coordinates in the configuration panel above to calculate a real-time 5-day solar power forecast. The system uses your live local weather parameters to query the Echo State Network dynamically!
                </p>
              </div>
            )}
          </>
        )}
      </main>

      {/* ---- Footer ---- */}
      <footer style={{
        borderTop: '1px solid var(--border)', padding: '16px 32px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        color: 'var(--text-muted)', fontSize: 11,
      }}>
        <span>
          <strong style={{ color: 'var(--text-secondary)' }}>ORION–AURORA</strong> · Dual-Model Solar Forecasting Demo ·
          Browser-native ESN + Adaptive Refinement
        </span>
        <span>
          Based on: <em>"Dual-Model Deep Learning Framework with ORION and AURORA for Robust and Accurate Solar Power Prediction in Smart Grid Systems"</em>
        </span>
      </footer>
    </div>
  );
}

// ---- Error Boundary ----
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:40,fontFamily:'monospace',color:'#f87171',background:'#0d1117',minHeight:'100vh'}}>
          <h2 style={{color:'#fbbf24',marginBottom:16}}>⚠ ORION-AURORA Error</h2>
          <pre style={{whiteSpace:'pre-wrap',fontSize:13}}>{String(this.state.error)}</pre>
          <pre style={{whiteSpace:'pre-wrap',fontSize:11,color:'#6b7280',marginTop:12}}>{this.state.error?.stack}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

// ---- Mount ----
try {
  const rootEl = document.getElementById('root');
  const root = ReactDOM.createRoot(rootEl);
  root.render(<ErrorBoundary><App /></ErrorBoundary>);
  console.log('[ORION] React mounted successfully');
} catch(e) {
  console.error('[ORION] Mount failed:', e);
  document.getElementById('root').innerHTML =
    '<div style="padding:40px;font-family:monospace;color:#f87171;background:#0d1117;min-height:100vh">' +
    '<h2 style="color:#fbbf24">Mount Error</h2><pre>' + String(e) + '</pre></div>';
}

</script>
